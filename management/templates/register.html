<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTala — Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        body { background-color: #e8edf2; }

        .nm-raised {
            box-shadow: 6px 6px 14px #c8cdd2, -6px -6px 14px #ffffff;
        }

        .nm-inset {
            box-shadow: inset 4px 4px 8px #c8cdd2, inset -4px -4px 8px #ffffff;
        }

        .nm-flat {
            box-shadow: 3px 3px 8px #c8cdd2, -3px -3px 8px #ffffff;
        }

        input:focus {
            outline: none;
            box-shadow: inset 4px 4px 8px #c8cdd2, inset -4px -4px 8px #ffffff, 0 0 0 2px rgba(99,102,241,0.25);
        }
    </style>
</head>
<body class="min-h-screen bg-[#e8edf2] flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Brand Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 nm-raised bg-[#e8edf2] rounded-2xl mb-4">
                <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-700 tracking-tight">iTala</h1>
            <p class="text-sm text-gray-400 mt-1">Your Personal Management System</p>
        </div>

        <!-- Register Card -->
        <div class="nm-raised bg-[#e8edf2] rounded-3xl p-8">

            <h2 class="text-base font-semibold text-gray-700 mb-6">Create a new account</h2>

            <form method="POST" action="{% url 'register' %}" class="space-y-4">
                {% csrf_token %}

                <!-- First Name + Last Name -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="first_name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">
                            First Name
                        </label>
                        <input
                            type="text"
                            id="first_name"
                            name="first_name"
                            maxlength="30"
                            value="{{ form.first_name|default:'' }}"
                            placeholder="Lance"
                            class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                        >
                    </div>
                    <div>
                        <label for="last_name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">
                            Last Name
                        </label>
                        <input
                            type="text"
                            id="last_name"
                            name="last_name"
                            maxlength="30"
                            value="{{ form.last_name|default:'' }}"
                            placeholder="Santos"
                            class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                        >
                    </div>
                </div>

                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">
                        Username <span class="text-red-400">*</span>
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        maxlength="150"
                        autocomplete="username"
                        value="{{ form.username|default:'' }}"
                        placeholder="Choose a username"
                        class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="email"
                        value="{{ form.email|default:'' }}"
                        placeholder="you@example.com"
                        class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">
                        Password <span class="text-red-400">*</span>
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="new-password"
                        placeholder="At least 8 characters"
                        class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                    >
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm_password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">
                        Confirm Password <span class="text-red-400">*</span>
                    </label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        required
                        autocomplete="new-password"
                        placeholder="Repeat your password"
                        class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                    >
                    <p id="pw-match-hint" class="text-xs mt-1.5 pl-1 hidden"></p>
                </div>

                <!-- Error -->
                {% if error %}
                <div class="nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 flex items-start gap-2">
                    <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <p class="text-sm text-red-400">{{ error }}</p>
                </div>
                {% endif %}

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full nm-flat bg-[#e8edf2] rounded-xl py-3 text-sm font-semibold text-indigo-500 hover:text-indigo-600 transition-colors duration-200 mt-2"
                >
                    Create Account
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-gray-200 text-center">
                <p class="text-xs text-gray-400">Already have an account?
                    <a href="{% url 'login' %}" class="text-indigo-500 font-semibold hover:text-indigo-600 transition-colors">Sign in</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 Nexus. All rights reserved.</p>
    </div>

    <script>
        // Real-time password match hint
        const pw = document.getElementById('password');
        const cpw = document.getElementById('confirm_password');
        const hint = document.getElementById('pw-match-hint');

        function checkMatch() {
            if (!cpw.value) { hint.classList.add('hidden'); return; }
            hint.classList.remove('hidden');
            if (pw.value === cpw.value) {
                hint.textContent = 'Passwords match';
                hint.className = 'text-xs mt-1.5 pl-1 text-green-400';
            } else {
                hint.textContent = 'Passwords do not match';
                hint.className = 'text-xs mt-1.5 pl-1 text-red-400';
            }
        }

        pw.addEventListener('input', checkMatch);
        cpw.addEventListener('input', checkMatch);
    </script>

</body>
</html>
