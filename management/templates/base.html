{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link src="{% static 'css/main.css' %}" > 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    {% block extra_styles %}{% endblock %}
</head>
<body class="bg-black text-blue-400 overflow-x-hidden">
    <!-- Matrix Background Animation -->
    <div class="matrix-bg" id="matrix"></div>
    
    <!-- Scan Line Effect -->
    <div class="scan-line"></div>
    
    <!-- Mobile Menu Button -->
    <button id="mobile-menu-btn" class="lg:hidden fixed top-4 left-4 z-50 bg-black border border-blue-500 p-2 rounded hover-glow">
        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-black border-r border-blue-900 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-blue-500 glow-text mb-8">&gt; Charles</h1>
            <nav class="space-y-2">
                <a href="{% url 'dashboard' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group {% block nav_dashboard %}{% endblock %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Dashboard</span>
                </a>
                <a href="{% url 'projects' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group {% block nav_projects %}{% endblock %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Projects</span>
                </a>
                <a href="{% url 'achievements' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group {% block nav_achievements %}{% endblock %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Achievements</span>
                </a>
                <a href="{% url 'tools' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group {% block nav_tools %}{% endblock %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Tools</span>
                </a>
                <a href="{% url 'inquiries' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group {% block nav_inquiries %}{% endblock %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Inquiries</span>
                </a>
                <a href="{% url 'internship' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group {% block nav_internship %}{% endblock %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Internship</span>
                </a>
                <a href="{% url 'logout' %}" class="flex items-center space-x-3 p-3 rounded hover:bg-blue-950 hover:border-l-4 hover:border-blue-500 transition-all group mt-8">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    <span class="group-hover:text-blue-300">Logout</span>
                </a>
            </nav>
        </div>
        
    </aside>
    
    <!-- Main Content -->
    <div class="lg:ml-64 min-h-screen relative z-10" id="matrix">
        <!-- Top Navbar -->
        <nav class="bg-black bg-opacity-90 backdrop-blur-sm border-b border-blue-900 p-4 sticky top-0 z-30">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4 flex-1 max-w-xl">
                    <div class="relative flex-1">
                        <input type="text" placeholder="Search projects..." class="w-full bg-blue-950 bg-opacity-30 border border-blue-800 rounded px-4 py-2 pl-10 text-blue-300 placeholder-blue-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        <svg class="w-5 h-5 absolute left-3 top-2.5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="relative p-2 hover:bg-blue-950 rounded-full transition-all hover-glow">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span class="absolute top-0 right-0 w-2 h-2 bg-blue-500 rounded-full pulse-glow"></span>
                    </button>
                    <div class="flex items-center space-x-2 border-l border-blue-900 pl-4">
                        <div class="w-8 h-8 rounded-full bg-blue-900 flex items-center justify-center text-blue-300 font-bold glow-border">
                            A
                        </div>
                        <div class="hidden md:block">
                            <div class="text-sm text-blue-300">Admin</div>
                            <div class="text-xs text-blue-600">admin@portfolio.dev</div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        
        <!-- Main Content Area -->
        <main class="p-6 space-y-6">
            {% block content %}
            {% endblock %}
        </main>
    </div>
    
    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
