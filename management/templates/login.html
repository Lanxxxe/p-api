<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTala — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        body { background-color: #e8edf2; }

        .nm-raised {
            box-shadow: 6px 6px 14px #c8cdd2, -6px -6px 14px #ffffff;
        }

        .nm-inset {
            box-shadow: inset 4px 4px 8px #c8cdd2, inset -4px -4px 8px #ffffff;
        }

        .nm-flat {
            box-shadow: 3px 3px 8px #c8cdd2, -3px -3px 8px #ffffff;
        }

        input:focus {
            outline: none;
            box-shadow: inset 4px 4px 8px #c8cdd2, inset -4px -4px 8px #ffffff, 0 0 0 2px rgba(99,102,241,0.25);
        }
    </style>
</head>
<body class="min-h-screen bg-[#e8edf2] flex items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <!-- Brand Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 nm-raised bg-[#e8edf2] rounded-2xl mb-4">
                <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-700 tracking-tight">iTala</h1>
            <p class="text-sm text-gray-400 mt-1">Your Personal Management System</p>
        </div>

        <!-- Login Card -->
        <div class="nm-raised bg-[#e8edf2] rounded-3xl p-8">

            <h2 class="text-base font-semibold text-gray-700 mb-6">Sign in to your account</h2>

            <form method="POST" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-2">
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        autocomplete="username"
                        placeholder="Enter your username"
                        class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Enter your password"
                        class="w-full nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-300 transition-all duration-200"
                    >
                </div>

                <!-- Remember Me -->
                <div class="flex items-center gap-2">
                    <input
                        type="checkbox"
                        id="remember"
                        name="remember"
                        class="w-4 h-4 rounded accent-indigo-500"
                    >
                    <label for="remember" class="text-sm text-gray-500 select-none">
                        Keep me signed in
                    </label>
                </div>

                <!-- Success -->
                {% if success %}
                <div class="nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 flex items-start gap-2">
                    <svg class="w-4 h-4 text-green-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-sm text-green-500">{{ success }}</p>
                </div>
                {% endif %}

                <!-- Error -->
                {% if error %}
                <div class="nm-inset bg-[#e8edf2] rounded-xl px-4 py-3 flex items-start gap-2">
                    <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-sm text-red-400">{{ error }}</p>
                </div>
                {% endif %}

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full nm-flat bg-[#e8edf2] rounded-xl py-3 text-sm font-semibold text-indigo-500 hover:text-indigo-600 transition-colors duration-200 mt-2"
                >
                    Sign In
                </button>
                <a href="{% url 'dashboard' %}" class="block text-center text-sm text-gray-500 hover:text-indigo-500 mt-2">Dashboard</a>
            </form>

            <div class="mt-6 pt-5 border-t border-gray-200 text-center">
                <p class="text-xs text-gray-400">Don't have an account?
                    <a href="{% url 'register' %}" class="text-indigo-500 font-semibold hover:text-indigo-600 transition-colors">Create one</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 Nexus. All rights reserved.</p>
    </div>

</body>
</html>
